<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#141414">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yoga Flow">
<meta name="description" content="요가 시퀀스를 기록하고 관리하는 앱">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="manifest" href="./manifest.json">
<title>Yoga Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=DM+Sans:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
--pri50:#f2f2f2;--pri100:#e0e0e0;--pri200:#c0c0c0;--pri400:#888;--pri500:#555;--pri600:#444;--pri800:#222;
--acc50:#f0eefa;--acc100:#d8d4f0;--acc200:#B8B4E8;--acc400:#8A84D0;--acc500:#6B64C0;--acc600:#4A44A0;--acc800:#2A2468;
--n50:#fafafa;--n100:#f0f0f0;--n200:#ddd;--n400:#aaa;--n600:#888;--n800:#444;--n900:#1a1a1a;
--wu-bg:#f0f8e4;--wu-bar:#C8E6A0;--wu-txt:#2a4a10;
--bu-bg:#e4f4ee;--bu-bar:#70C8B0;--bu-txt:#0a3a2a;
--pk-bg:#e4f8f4;--pk-bar:#A0E8E0;--pk-txt:#0a4a4a;
--cd-bg:#eeedf8;--cd-bar:#B8B4E8;--cd-txt:#2A2468;
--s-bg:#e4f4ee;--s-txt:#0a3a2a;--s-bd:#70C8B0;
--w-bg:#f0f8e4;--w-txt:#2a4a10;--w-bd:#C8E6A0;
--d-bg:#fce8e8;--d-txt:#791F1F;--d-bd:#F09595;
--i-bg:#e4f8f4;--i-txt:#0a4a4a;--i-bd:#A0E8E0;
--serif:'Noto Serif KR',Georgia,serif;
--sans:'Noto Sans KR','DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
--r-sm:6px;--r-md:10px;--r-lg:16px;--r-full:9999px;
--tr:150ms ease;
}
[data-theme=light]{
--bg:#f0efe8;--bg2:#e8e7e0;--bg3:#dddcd5;--bgApp:#e6e5de;
--t1:#2a2a28;--t2:#7a7a72;--t3:#a0a098;
--bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.12);
--card:rgba(245,244,238,1);--cardBd:rgba(0,0,0,.07);
--navBg:rgba(240,239,232,.92);--navAct:#4A9A30;--navIn:#a0a098;
--pillAct:#70C8B0;--pillActT:#0a3a2a;--pillIn:#f0f0f0;--pillInT:#888;
}
[data-theme=dark]{
--bg:#141414;--bg2:#1c1c1c;--bg3:#242424;--bgApp:#0a0a0a;
--t1:#e8e8e8;--t2:#888;--t3:#555;
--bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.1);
--card:rgba(255,255,255,.04);--cardBd:rgba(255,255,255,.06);
--navBg:rgba(20,20,20,.94);--navAct:#C8E6A0;--navIn:#555;
--pillAct:#70C8B0;--pillActT:#0a3a2a;--pillIn:rgba(255,255,255,.06);--pillInT:#888;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
.app{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.app input,.app textarea,.app [contenteditable]{-webkit-user-select:text;user-select:text}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:#e0e0e0;color:var(--t1);line-height:1.6;min-height:100dvh;overflow:hidden;display:flex;align-items:center;justify-content:center}
[data-theme=dark] body{background:#080808}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--n200);border-radius:9px}

.app{width:390px;height:min(844px,100dvh);display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;border-radius:24px;border:.5px solid var(--bd)}
@media(max-width:430px){.app{width:100%;height:100dvh;border-radius:0;border:none}body{background:var(--bgApp)}}
@media all and (display-mode:standalone){.app{padding-top:env(safe-area-inset-top,44px)}.page{scroll-padding-top:env(safe-area-inset-top,44px)}}
.page{flex:1;overflow-y:auto;padding-bottom:64px;-webkit-overflow-scrolling:touch}
.page.hidden{display:none}

/* Nav */
.nav{position:absolute;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(4,1fr);background:var(--navBg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--bd);padding:6px 0 8px;z-index:100;border-radius:0 0 24px 24px}
@media(max-width:430px){.nav{border-radius:0;padding-bottom:env(safe-area-inset-bottom,8px)}}
.nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;color:var(--navIn);transition:color var(--tr)}
.nav button.on{color:var(--navAct)}
.nav button:active{transform:scale(.9);opacity:.7}
.nav-lbl{font-size:11px;font-weight:500}

/* Common */
.card{background:var(--card);border:.5px solid var(--cardBd);border-radius:var(--r-lg);padding:14px 16px;transition:all var(--tr)}
.card:hover{border-color:var(--bd2)}
.card:active{transform:scale(.98);opacity:.9}
.badge{font-size:11px;padding:2px 8px;border-radius:var(--r-sm);font-weight:500;white-space:nowrap}
.b-beg{background:var(--i-bg);color:var(--i-txt)}.b-int{background:var(--w-bg);color:var(--w-txt)}
.b-adv{background:rgba(184,180,232,.15);color:#8A84D0}.b-all{background:var(--s-bg);color:var(--s-txt)}
.b-ai{background:rgba(184,180,232,.15);color:#B8B4E8}
.pill{font-size:12px;padding:5px 12px;border-radius:var(--r-full);cursor:pointer;white-space:nowrap;background:var(--pillIn);color:var(--pillInT);transition:all .2s cubic-bezier(.25,.1,.25,1)}
.pill.on{background:var(--pillAct);color:var(--pillActT)}
.pill.on-vinyasa{background:#C8E6A0;color:#2a4a10}
.pill.on-hatha{background:#70C8B0;color:#0a3a2a}
.pill.on-yin{background:#B8B4E8;color:#2A2468}
.pill.on-restorative{background:#A0E8E0;color:#0a4a4a}
.pill.on-ashtanga{background:#F0C895;color:#5a3a10}
.pill.on-power{background:#F09595;color:#791F1F}
.pill.on-beginner{background:#A0E8E0;color:#0a4a4a}
.pill.on-intermediate{background:#C8E6A0;color:#2a4a10}
.pill.on-advanced{background:#B8B4E8;color:#2A2468}
.pill.on-allLevels{background:#70C8B0;color:#0a3a2a}
.pill.on-focus{background:rgba(200,230,160,.2);color:#C8E6A0}
[data-theme=light] .pill.on-vinyasa{background:#d8f0b0;color:#2a4a10}
[data-theme=light] .pill.on-hatha{background:#90d8c4;color:#0a3a2a}
[data-theme=light] .pill.on-yin{background:#c8c4f0;color:#2A2468}
[data-theme=light] .pill.on-restorative{background:#b0f0e8;color:#0a4a4a}
[data-theme=light] .pill.on-ashtanga{background:#f0d4a8;color:#5a3a10}
[data-theme=light] .pill.on-power{background:#f0b0b0;color:#791F1F}
[data-theme=light] .pill.on-focus{background:rgba(74,154,48,.12);color:#4A9A30}
.pill:active{transform:scale(.93)}
.btn-pri{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-md);background:#6B64C0;color:#fff;font-size:13px;font-weight:500;transition:opacity var(--tr)}
.btn-pri:hover{opacity:.9}.btn-pri:active{transform:scale(.98)}
.btn-sec{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-md);border:.5px solid var(--bd2);color:var(--t1);font-size:13px;font-weight:500}
.input{width:100%;padding:8px 12px;font-size:16px;border:.5px solid var(--bd);border-radius:var(--r-md);background:var(--bg2);color:var(--t1);outline:none}
.input:focus{border-color:#70C8B0}
.input::placeholder{color:var(--t3)}
.select{padding:4px 8px;font-size:16px;border:.5px solid var(--bd);border-radius:var(--r-sm);background:var(--bg2);color:var(--t2);outline:none}
.textarea{width:100%;padding:8px 12px;font-size:16px;border:.5px solid var(--bd);border-radius:var(--r-md);background:var(--bg2);color:var(--t1);outline:none;resize:vertical;min-height:60px}
.back{display:flex;padding:4px;color:var(--t2)}
.sec-bar{width:4px;border-radius:2px;flex-shrink:0}
.sb-wu{background:var(--wu-bar)}.sb-bu{background:var(--bu-bar)}.sb-pk{background:var(--pk-bar)}.sb-cd{background:var(--cd-bar)}
.sp-wu:not(.on){background:var(--wu-bg);color:var(--wu-txt)}.sp-bu:not(.on){background:var(--bu-bg);color:var(--bu-txt)}
.sp-pk:not(.on){background:var(--pk-bg);color:var(--pk-txt)}.sp-cd:not(.on){background:var(--cd-bg);color:var(--cd-txt)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-wu{background:var(--wu-bar)}.dot-bu{background:var(--bu-bar)}.dot-pk{background:var(--pk-bar)}.dot-cd{background:var(--cd-bar)}

/* Home */
.home-hdr{padding:24px 20px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.home-logo{display:flex;align-items:center;gap:10px}
.home-lotus{width:36px;height:36px;flex-shrink:0}
.home-hdr h1{font-family:var(--serif);font-size:22px;font-weight:300;margin-top:4px;letter-spacing:-.2px;line-height:1.2}
.app-name{font-size:10px;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--t2)}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 20px}
.sec-title{font-size:13px;font-weight:500;letter-spacing:.3px;color:var(--t1)}
.sec-link{font-size:12px;color:var(--pri500);cursor:pointer}
.sec-meta{font-size:12px;color:var(--t3)}
.today-scroll{display:flex;gap:8px;overflow-x:auto;padding:0 20px 4px;scrollbar-width:none}
.today-scroll::-webkit-scrollbar{display:none}
.cls-card{min-width:180px;padding:14px 16px;border-radius:var(--r-md);background:var(--bg2);cursor:pointer;flex-shrink:0;transition:all .2s ease}
.cls-card:active{transform:scale(.96);opacity:.9}
.cls-next{background:#C8E6A0}
.cls-next .cls-time{color:#2a4a10;font-weight:500}
.cls-next .cls-name{color:#2a4a10}
.cls-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cls-time{font-size:12px;font-weight:500;color:var(--t2)}
.b-next{font-size:11px;background:rgba(0,0,0,.12);color:#2a4a10;padding:1px 6px;border-radius:4px}
.cls-name{font-size:15px;font-weight:500;color:var(--t1)}
.cls-add{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:120px;gap:4px;border:.5px dashed var(--bd2);background:transparent;color:var(--t3);font-size:12px;border-radius:var(--r-md);cursor:pointer}
.home-acts{padding:0 20px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.act-card{padding:16px 18px;border-radius:var(--r-md);cursor:pointer;transition:all .2s cubic-bezier(.25,.1,.25,1)}
.act-card:hover{transform:translateY(-2px)}
.act-card:active{transform:scale(.96);opacity:.9}
.act-new{background:#B2E0D6;border-radius:var(--r-lg)}.act-new .act-t{color:#0a3a2a}.act-new .act-d{color:rgba(10,58,42,.6)}.act-new svg{color:#0a3a2a}
.act-ai{background:#B8B4E8;border-radius:var(--r-lg)}.act-ai .act-t{color:#1a1648}.act-ai .act-d{color:rgba(26,22,72,.6)}.act-ai svg{color:#1a1648}
.act-t{font-size:14px;font-weight:500;margin-top:10px}
.act-d{font-size:12px;margin-top:2px}
.seq-card{margin:0 20px 10px;cursor:pointer}
.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--r-lg);margin-bottom:8px}
.swipe-del{position:absolute;right:0;top:0;bottom:0;width:80px;display:flex;align-items:center;justify-content:center;background:#E53935;color:#fff;font-size:13px;font-weight:500;border-radius:0 var(--r-lg) var(--r-lg) 0;z-index:1}
.swipe-inner{position:relative;z-index:2;transition:transform .35s cubic-bezier(.32,.72,0,1);background:var(--bg2);border:.5px solid var(--cardBd);border-radius:var(--r-lg);padding:14px 16px;will-change:transform;-webkit-backface-visibility:hidden;backface-visibility:hidden}
.swipe-inner.swiping{transition:none}
.swipe-inner.open{transform:translateX(-80px)}
.swipe-del{opacity:0;transition:opacity .25s ease}
.swipe-wrap.revealing .swipe-del{opacity:1}
.seq-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.seq-info{flex:1;min-width:0}
.seq-title{font-size:15px;font-weight:500;color:var(--t1)}
.seq-meta{font-size:12px;color:var(--t2);margin-top:4px}
.seq-badges{display:flex;gap:4px;flex-shrink:0}
.seq-time{font-size:11px;color:var(--t3);margin-top:8px}

/* Editor */
.ed-hdr{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:.5px solid var(--bd)}
.btn-del-seq{width:32px;height:32px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all var(--tr)}
.btn-del-seq:active{color:var(--d-txt);background:var(--d-bg)}
.ed-name{width:100%;font-family:var(--sans);font-size:18px;font-weight:500;border:none;outline:none;background:transparent;color:var(--t1);padding:0;margin-bottom:10px;letter-spacing:0}
.ed-name::placeholder{color:var(--t3)}
.ed-meta{padding:14px 20px;border-bottom:.5px solid var(--bd)}
.ed-meta-row{display:flex;gap:8px;flex-wrap:wrap}
.ed-filt{padding:10px 20px;display:flex;gap:6px;overflow-x:auto;border-bottom:.5px solid var(--bd);scrollbar-width:none}
.ed-filt::-webkit-scrollbar{display:none}
.ed-poses{flex:1;padding:12px 20px;overflow-y:auto}
.sec-lbl{display:flex;align-items:center;gap:6px;padding:4px 0;margin:14px 0 6px;font-size:11px;font-weight:500;color:var(--t2)}
.sec-opt{font-size:11px;color:var(--t3);font-style:italic;font-weight:400}
.pose{display:flex;align-items:center;gap:10px;padding:12px 14px;border:.5px solid var(--cardBd);border-radius:var(--r-md);margin-bottom:8px;cursor:grab;background:var(--card);transition:all var(--tr)}
.pose:hover{border-color:var(--bd2)}
.pose.drag{opacity:.4}
.pose-grip{color:var(--t3);opacity:.35;flex-shrink:0;display:flex}
.pose-body{flex:1;min-width:0}
.pose-row{display:flex;justify-content:space-between;align-items:center}
.pose-nm{font-size:15px;font-weight:500;color:var(--t1)}
.pose-hd{font-size:11px;color:var(--t3)}
.pose-sub{font-size:11px;color:var(--t2);margin-top:2px}
.pose-del{color:var(--t3);padding:4px;transition:opacity var(--tr);flex-shrink:0;display:flex;opacity:.5}
@media(hover:hover){.pose-del{opacity:0}.pose:hover .pose-del{opacity:1}}
.pose-del:active{color:var(--d-txt);opacity:1}
.pose-empty{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px;border:.5px dashed var(--bd2);border-radius:var(--r-md);color:var(--t3);font-size:12px;cursor:pointer;margin-bottom:6px}
.pose-empty:hover{background:var(--bg2)}
.sec-drop-zone{padding:2px 0;border-radius:var(--r-md);border:2px solid transparent;transition:border-color var(--tr),background var(--tr)}
.sec-drop-zone.drop-hover{border-color:#70C8B0;background:rgba(112,200,176,.06)}
.drop-placeholder{padding:12px;text-align:center;font-size:11px;color:var(--t3);border:.5px dashed transparent;border-radius:var(--r-md);transition:all var(--tr)}
.sec-drop-zone.drop-hover .drop-placeholder{border-color:rgba(112,200,176,.3);color:#70C8B0}
.pose.drag{opacity:.3}
.pose-grip{touch-action:none;-webkit-user-select:none;user-select:none;padding:8px 4px;margin:-8px -4px}
.pose{-webkit-user-select:none;user-select:none}
.ed-poses{-webkit-user-select:none;user-select:none}
.ed-acts{padding:8px 20px;display:flex;gap:8px}
.ed-abtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:var(--r-md);font-size:13px;font-weight:500;transition:all var(--tr)}
.ed-abtn:active{transform:scale(.98)}
.ea-add{background:rgba(112,200,176,.12);color:#70C8B0}
.ea-flow{background:var(--pk-bg);color:var(--pk-txt)}
.ea-ai{background:var(--acc50);color:var(--acc800)}
.sec-add-wrap{position:relative;margin:4px 0 8px}
.sec-add-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:4px;padding:8px;border-radius:var(--r-md);background:transparent;border:.5px dashed var(--bd2);color:var(--t3);font-size:12px;cursor:pointer;transition:all var(--tr)}
.sec-add-btn:hover{background:var(--bg2);color:var(--t2);border-color:var(--t3)}
.sec-add-menu{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:4px;background:var(--bg);border:.5px solid var(--bd2);border-radius:var(--r-md);padding:4px;display:flex;flex-direction:column;min-width:180px;z-index:50;animation:popIn .2s cubic-bezier(.25,.1,.25,1)}
.sec-add-menu.hidden{display:none}
.sec-add-menu button{display:flex;align-items:center;gap:8px;padding:10px 12px;font-size:13px;color:var(--t1);background:none;border:none;border-radius:var(--r-sm);cursor:pointer;transition:background var(--tr);text-align:left;width:100%}
.sec-add-menu button:hover{background:var(--bg2)}
.sec-add-menu button svg{color:var(--t2);flex-shrink:0}

.flow-group{border:2px solid var(--pk-bar);border-radius:12px;margin-bottom:6px;overflow:hidden;background:var(--card);-webkit-user-select:none;user-select:none}
.flow-header{background:var(--pk-bg);padding:6px 12px;display:flex;justify-content:space-between;align-items:center;touch-action:none;-webkit-user-select:none;user-select:none;cursor:grab}
.flow-header-left{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--pk-txt)}
.flow-repeat-badge{font-size:11px;background:var(--acc200);color:var(--pk-txt);padding:1px 8px;border-radius:4px}
.flow-poses{padding:4px 12px}
.flow-pose-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:.5px solid var(--bd)}
.flow-pose-item:last-child{border-bottom:none}
.flow-pose-num{width:18px;height:18px;border-radius:50%;background:var(--pk-bg);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--pk-txt);font-weight:500;flex-shrink:0}
.flow-footer{background:var(--pk-bg);padding:6px 12px;display:flex;justify-content:center}
.flow-add-btn{font-size:11px;color:var(--pk-txt);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px}
.ed-bar{padding:8px 20px;border-top:.5px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.ed-stats{display:flex;gap:4px;font-size:12px;color:var(--t2)}

/* List */
.list-hdr{padding:12px 20px;display:flex;flex-direction:column;gap:8px}
.list-hdr-top{display:flex;align-items:center;gap:8px;border-bottom:.5px solid var(--bd);padding-bottom:12px}
.list-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.list-top h1{font-family:var(--sans);font-size:18px;letter-spacing:0;font-weight:500}
.search-wrap{flex:1;display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--bg2);border-radius:var(--r-md);border:.5px solid var(--bd);color:var(--t3)}
.search-in{flex:1;border:none;outline:none;background:transparent;font-size:16px;color:var(--t1)}
.search-in::placeholder{color:var(--t3)}
.list-filt{padding:8px 20px;display:flex;gap:6px;overflow-x:auto;border-bottom:.5px solid var(--bd);scrollbar-width:none}
.list-filt::-webkit-scrollbar{display:none}
.list-sort{padding:8px 20px;display:flex;gap:4px}
.sort-btn{font-size:11px;padding:3px 8px;border-radius:4px;background:var(--bg2);color:var(--t2);cursor:pointer}
.sort-btn.on{background:var(--pri50);color:var(--pri600)}
.list-body{padding:0 20px 12px}

/* AI */
.ai-hdr{padding:12px 20px;display:flex;align-items:center;gap:8px;border-bottom:.5px solid var(--bd)}
.ai-form{padding:16px 20px}
.fg{margin-bottom:16px}
.fg-lbl{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:6px}
.fg-opt{font-weight:400;color:var(--t3)}
.fg-hint{font-size:11px;color:var(--t3);margin-top:4px}
.chip-group{display:flex;gap:6px;flex-wrap:wrap}
.pill.on-alt{background:rgba(200,230,160,.2);color:#C8E6A0}
.dur-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.dur-card{padding:12px;text-align:center;border-radius:var(--r-md);background:var(--bg2);border:.5px solid var(--bd);cursor:pointer;transition:all .2s cubic-bezier(.25,.1,.25,1)}
.dur-card:active{transform:scale(.95)}
.dur-card.on{background:#70C8B0;border-color:#70C8B0}
.dur-num{font-size:20px;font-weight:500;display:block}
.dur-card.on .dur-num{color:#fff}
.dur-card:not(.on) .dur-num{color:var(--t2)}
.dur-unit{font-size:11px;display:block;margin-top:2px}
.dur-card.on .dur-unit{color:rgba(255,255,255,.7)}
.dur-card:not(.on) .dur-unit{color:var(--t3)}
.gen-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:#6B64C0;color:#fff;border-radius:var(--r-md);font-size:14px;font-weight:500}
.gen-btn:hover{opacity:.9}.gen-btn:active{transform:scale(.97)}.gen-btn:disabled{opacity:.5;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Settings */
.set-hdr{padding:12px 20px;display:flex;align-items:center;gap:8px;border-bottom:.5px solid var(--bd)}
.set-body{padding:20px 20px}
.set-sec{font-size:10px;color:var(--t3);letter-spacing:1.5px;margin-bottom:10px;margin-top:8px}
.set-card{background:var(--card);border:.5px solid var(--cardBd);border-radius:var(--r-md);padding:12px;margin-bottom:8px}
.set-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.set-it{font-size:14px;font-weight:500;color:var(--t1)}
.b-conn{background:var(--s-bg);color:var(--s-txt)}.b-disc{background:var(--d-bg);color:var(--d-txt)}
.api-row{display:flex;gap:8px}
.api-in{flex:1;font-family:monospace;font-size:16px}
.set-hint{font-size:11px;color:var(--t3);margin-top:4px}
.set-grp{border:.5px solid var(--cardBd);border-radius:var(--r-md);overflow:hidden;margin-bottom:16px}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:12px;color:var(--t2)}
.set-row.brd{border-bottom:.5px solid var(--bd)}
.set-row.clk{cursor:pointer;transition:all var(--tr)}
.set-row.clk:hover{background:var(--bg2)}
.set-row.clk:active{transform:scale(.98);opacity:.8}
.lang-tog{display:flex;background:var(--bg2);border-radius:var(--r-md);overflow:hidden;border:.5px solid var(--bd)}
.lang-btn{font-size:12px;padding:4px 12px;color:var(--t2);transition:all var(--tr)}
.lang-btn.on{background:var(--t1);color:var(--bg)}
.tog-track{position:relative;width:36px;height:20px;background:var(--bd);border-radius:10px;cursor:pointer;transition:background .25s cubic-bezier(.25,.1,.25,1)}
.tog-track.on{background:#70C8B0}
.tog-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.tog-track.on .tog-thumb{transform:translateX(16px)}
.dng{color:var(--d-txt)!important}

/* Modal */
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:modalBgIn .2s ease}
.modal-bg.hidden{display:none}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;height:80vh;display:flex;flex-direction:column;overflow:hidden;animation:modalIn .3s cubic-bezier(.25,.1,.25,1)}
.modal h3{font-family:var(--sans);font-weight:500;font-size:16px;margin-bottom:16px}
.asana-row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:var(--r-md);cursor:pointer;transition:background .3s ease,border-color .3s ease;position:relative;border:1.5px solid transparent}
@media(hover:hover){.asana-row:hover{background:var(--bg2)}}
.asana-row:active{background:var(--bg2);opacity:.8}
.asana-row.asana-added{background:rgba(200,230,160,.15);border-color:#C8E6A0}
.asana-row.asana-added::after{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:14px;color:#C8E6A0;content:'\2713  \uCD94\uAC00\uB428';font-weight:500}
.mf{margin-bottom:12px}
.mf label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px}
.mf-row{display:flex;gap:8px}
.modal-acts{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

/* Anim */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalIn{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalBgIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:translateX(-50%) scale(.95) translateY(8px)}to{opacity:1;transform:translateX(-50%) scale(1) translateY(0)}}
@keyframes stagger{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes shimmer{from{opacity:.6}to{opacity:1}}
.fade-in{animation:fadeIn .25s ease}
.slide-left{animation:slideLeft .28s cubic-bezier(.25,.1,.25,1)}
.slide-right{animation:slideRight .28s cubic-bezier(.25,.1,.25,1)}
.slide-up{animation:slideUp .25s ease}
.stagger>*{opacity:0;animation:stagger .3s ease forwards}
.stagger>*:nth-child(1){animation-delay:.05s}
.stagger>*:nth-child(2){animation-delay:.1s}
.stagger>*:nth-child(3){animation-delay:.15s}
.stagger>*:nth-child(4){animation-delay:.2s}
.stagger>*:nth-child(5){animation-delay:.25s}
.stagger>*:nth-child(6){animation-delay:.3s}
.stagger>*:nth-child(7){animation-delay:.35s}
</style>
</head>

function loadSettings(){
  const s=LS.get(KEYS.SET);
  if(s){state.lang=s.language||'ko';state.theme=s.theme||'dark';state.poseNaming=s.poseNaming||'ko-sanskrit';state.aiModel=s.aiModel||state.aiModel;}
  document.documentElement.setAttribute('data-theme',state.theme);
}
function saveSettings(){LS.set(KEYS.SET,{language:state.lang,theme:state.theme,poseNaming:state.poseNaming,aiModel:state.aiModel})}
function t(k,p){let s=T[state.lang]?.[k]||T.en[k]||k;if(p)Object.entries(p).forEach(([a,b])=>{s=s.replace('{'+a+'}',b)});return s}
function getSeqs(){return LS.get(KEYS.SEQ)||[]}
function saveSeq(seq){const seqs=getSeqs();const i=seqs.findIndex(s=>s.id===seq.id);if(i>=0)seqs[i]={...seq,updatedAt:new Date().toISOString()};else seqs.unshift({...seq,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});LS.set(KEYS.SEQ,seqs)}
function delSeq(id){LS.set(KEYS.SEQ,getSeqs().filter(s=>s.id!==id))}
function getClasses(){return LS.get(KEYS.CLS)||[]}
function saveClass(cls){const all=getClasses();const i=all.findIndex(c=>c.id===cls.id);if(i>=0)all[i]=cls;else all.push(cls);LS.set(KEYS.CLS,all)}
function deleteClass(id){LS.set(KEYS.CLS,getClasses().filter(c=>c.id!==id))}
function getApiKey(){return LS.str(KEYS.API)}
function setApiKey(k){LS.setStr(KEYS.API,k)}
function timeAgo(d){const ms=Date.now()-new Date(d).getTime();const h=Math.floor(ms/36e5);const dy=Math.floor(ms/864e5);if(h<1)return t('edited')+' <1h';if(h<24)return t('edited')+' '+t('hoursAgo',{n:h});if(dy===1)return t('edited')+' '+t('yesterday');return t('edited')+' '+t('daysAgo',{n:dy})}
function getLvlCls(l){return l==='beginner'?'b-beg':l==='intermediate'?'b-int':l==='advanced'?'b-adv':'b-all'}
function getLvlT(l){return l==='all'?t('allLevels'):t(l)}
function poseName(p){const n=state.poseNaming;if(n==='ko-sanskrit')return p.pronun||p.sanskrit||p.name;if(n==='sanskrit')return p.sanskrit||p.name;return p.name}
function poseSub(p){const n=state.poseNaming;if(n==='ko-sanskrit')return p.nameKo||p.name;if(n==='en-sanskrit')return p.sanskrit;if(n==='sanskrit')return p.name;return p.sanskrit}
function poseCount(poses){return poses.reduce((c,p)=>c+(p.type==='flow'?(p.poses||[]).length:1),0)}

function nav(pg){lastPage=state.page;state.page=pg;state.editId=null;state.edFilter='all';render()}
function render(){
  const app=document.getElementById('app');
  const pages=app.querySelectorAll('.page');pages.forEach(p=>p.remove());
  const div=document.createElement('div');
  const fromIdx=TAB_IDX[lastPage]??0;const toIdx=TAB_IDX[state.page]??0;
  let anim='fade-in';
  if(state.page==='editor')anim='slide-up';
  else if(fromIdx<toIdx)anim='slide-left';
  else if(fromIdx>toIdx)anim='slide-right';
  div.className='page '+anim;
  switch(state.page){
    case 'home':div.innerHTML=renderHome();break;
    case 'sequences':div.innerHTML=renderList();break;
    case 'editor':div.innerHTML=renderEditor();break;
    case 'ai':div.innerHTML=renderAI();break;
    case 'settings':div.innerHTML=renderSettings();break;
  }
  app.insertBefore(div,document.getElementById('nav'));
  renderNav();
}

let dragPoseId=null;let dragEl=null;let dragGhost=null;let touchStartY=0;let isDragging=false;
function handleDragStart(e,pid){dragPoseId=pid;e.dataTransfer.effectAllowed='move';e.target.classList.add('drag');}
function handleDragEnd(e){dragPoseId=null;e.target.classList.remove('drag');document.querySelectorAll('.drop-hover').forEach(el=>el.classList.remove('drop-hover'));}
function handleDrop(e,targetSec){
  e.preventDefault();if(!dragPoseId)return;
  const seq=getSeqs().find(s=>s.id===state.editId);if(!seq)return;
  const pose=seq.poses.find(p=>p.id===dragPoseId);if(!pose)return;
  pose.section=targetSec;
  saveSeq(seq);dragPoseId=null;render();
}
function handleDropOnPose(e,targetPid,targetSec){
  e.preventDefault();e.stopPropagation();if(!dragPoseId||dragPoseId===targetPid)return;
  const seq=getSeqs().find(s=>s.id===state.editId);if(!seq)return;
  const fromIdx=seq.poses.findIndex(p=>p.id===dragPoseId);
  const toIdx=seq.poses.findIndex(p=>p.id===targetPid);
  if(fromIdx<0||toIdx<0)return;
  const [moved]=seq.poses.splice(fromIdx,1);
  moved.section=targetSec;
  seq.poses.splice(toIdx,0,moved);
  saveSeq(seq);dragPoseId=null;render();
}

// Touch drag-drop for mobile
function initTouchDrag(){
  document.addEventListener('touchstart',function(e){
    const grip=e.target.closest('.pose-grip');
    const flowGrip=e.target.closest('.flow-header');
    if(!grip&&!flowGrip)return;
    const pose=grip?grip.closest('.pose'):flowGrip.closest('.flow-group');
    if(!pose)return;
    e.preventDefault();
    const pid=pose.dataset.pid;
    dragPoseId=pid;dragEl=pose;touchStartY=e.touches[0].clientY;isDragging=false;
    dragEl.style.transition='none';
  },{passive:false});

  document.addEventListener('touchmove',function(e){
    if(!dragEl||!dragPoseId)return;
    e.preventDefault();
    const dy=e.touches[0].clientY-touchStartY;
    if(Math.abs(dy)>8)isDragging=true;
    if(!isDragging)return;
    dragEl.style.opacity='0.5';dragEl.style.transform=`translateY(${dy}px)`;dragEl.style.zIndex='50';
    const touch=e.touches[0];
    document.querySelectorAll('.sec-drop-zone').forEach(zone=>{
      const r=zone.getBoundingClientRect();
      if(touch.clientY>=r.top&&touch.clientY<=r.bottom){zone.classList.add('drop-hover');}
      else{zone.classList.remove('drop-hover');}
    });
    document.querySelectorAll('.pose').forEach(p=>{
      if(p===dragEl)return;
      const r=p.getBoundingClientRect();
      const mid=r.top+r.height/2;
      if(touch.clientY>=r.top&&touch.clientY<=r.bottom){
        p.style.borderTop=touch.clientY<mid?'2px solid var(--pri400)':'';
        p.style.borderBottom=touch.clientY>=mid?'2px solid var(--pri400)':'';
      }else{p.style.borderTop='';p.style.borderBottom='';}
    });
  },{passive:false});

  document.addEventListener('touchend',function(e){
    if(!dragEl||!dragPoseId){return;}
    if(!isDragging){dragEl.style.opacity='';dragEl.style.transform='';dragEl.style.zIndex='';dragEl.style.transition='';dragPoseId=null;dragEl=null;return;}
    const touch=e.changedTouches[0];
    let dropped=false;
    // Check if dropped on another pose
    document.querySelectorAll('.pose').forEach(p=>{
      if(p===dragEl)return;
      const r=p.getBoundingClientRect();
      if(touch.clientY>=r.top&&touch.clientY<=r.bottom){
        const targetPid=p.dataset.pid;
        const targetZone=p.closest('.sec-drop-zone');
        const targetSec=targetZone?targetZone.dataset.section:'buildup';
        const seq=getSeqs().find(s=>s.id===state.editId);
        if(seq){
          const fi=seq.poses.findIndex(x=>x.id===dragPoseId);
          const ti=seq.poses.findIndex(x=>x.id===targetPid);
          if(fi>=0&&ti>=0){
            const [mv]=seq.poses.splice(fi,1);mv.section=targetSec;
            const mid=r.top+r.height/2;
            const insertAt=touch.clientY<mid?ti:(fi<ti?ti:ti+1);
            seq.poses.splice(Math.min(insertAt,seq.poses.length),0,mv);
            saveSeq(seq);dropped=true;
          }
        }
      }
    });
    // Check if dropped on empty section
    if(!dropped){
      document.querySelectorAll('.sec-drop-zone').forEach(zone=>{
        const r=zone.getBoundingClientRect();
        if(touch.clientY>=r.top&&touch.clientY<=r.bottom){
          const targetSec=zone.dataset.section;
          const seq=getSeqs().find(s=>s.id===state.editId);
          if(seq){const pose=seq.poses.find(x=>x.id===dragPoseId);if(pose){pose.section=targetSec;saveSeq(seq);dropped=true;}}
        }
      });
    }
    // Cleanup
    document.querySelectorAll('.pose').forEach(p=>{p.style.borderTop='';p.style.borderBottom='';});
    document.querySelectorAll('.drop-hover').forEach(el=>el.classList.remove('drop-hover'));
    if(dragEl){dragEl.style.opacity='';dragEl.style.transform='';dragEl.style.zIndex='';dragEl.style.transition='';}
    dragPoseId=null;dragEl=null;isDragging=false;
    if(dropped)render();
  });
}

<span style="font-size:11px;color:var(--t3)">${state.lang==='ko'?'반복':'Repeat'}:</span>
<select class="select" onchange="setFlowRepeat(this.value)" style="padding:4px 8px"><option value="rtl" selected>${state.lang==='ko'?'오른쪽 먼저':'R then L'}</option><option value="ltr">${state.lang==='ko'?'왼쪽 먼저':'L then R'}</option><option value="alt">${state.lang==='ko'?'번갈아':'Alternating'}</option><option value="none">${state.lang==='ko'?'반복 없음':'No repeat'}</option></select>
</div></div>`;
}
function updateFlowAsanaList(){
  document.getElementById('modal').innerHTML=renderFlowAsanaModal();
  const inp=document.getElementById('flow-asana-search');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
}
function pickFlowAsana(aid,e){
  const a=ADB.find(x=>x.id===aid);if(!a||!flowTargetId)return;
  const seq=getSeqs().find(s=>s.id===state.editId);if(!seq)return;
  const flow=seq.poses.find(p=>p.id===flowTargetId);if(!flow||flow.type!=='flow')return;
  flow.poses.push({name:a.name,nameKo:a.nameKo,sanskrit:a.sanskrit,pronun:a.pronun||'',hold:'5 breaths'});
  saveSeq(seq);
  // Visual feedback on the clicked row
  const row=e?.target?.closest('.asana-row');
  if(row){
    row.classList.add('asana-added');
    setTimeout(()=>row.classList.remove('asana-added'),1200);
  }
}
function setFlowRepeat(val){
  if(!flowTargetId)return;
  const seq=getSeqs().find(s=>s.id===state.editId);if(!seq)return;
  const flow=seq.poses.find(p=>p.id===flowTargetId);if(!flow)return;
  flow.repeat=val;saveSeq(seq);
}
function edDelFlowPose(flowId,idx){
  const seq=getSeqs().find(s=>s.id===state.editId);if(!seq)return;
  const flow=seq.poses.find(p=>p.id===flowId);if(!flow||!flow.poses)return;
  flow.poses.splice(idx,1);
  if(flow.poses.length===0){seq.poses=seq.poses.filter(p=>p.id!==flowId);}
  saveSeq(seq);render();
}
function edDelPose(pid){
  const seq=getSeqs().find(s=>s.id===state.editId);if(!seq)return;
  seq.poses=seq.poses.filter(p=>p.id!==pid);saveSeq(seq);render();
}
function edEditHold(pid){
  const seq=getSeqs().find(s=>s.id===state.editId);if(!seq)return;
  const pose=seq.poses.find(p=>p.id===pid);if(!pose)return;
  const opts=state.lang==='ko'?['5회 호흡','8회 호흡','10회 호흡','30초','1분','2분','3라운드','5라운드']:['5 breaths','8 breaths','10 breaths','30 sec','1 min','2 min','3 rounds','5 rounds'];
  document.getElementById('modal-bg').classList.remove('hidden');
  document.getElementById('modal').innerHTML=`<h3>${state.lang==='ko'?'유지 시간 수정':'Edit hold time'}</h3>
<p style="font-size:13px;color:var(--t2);margin-bottom:16px">${poseName(pose)}</p>
<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${opts.map(o=>`<button class="pill ${pose.hold===o?'on':''}" onclick="setHold('${pid}','${o}')">${o}</button>`).join('')}</div>
<div style="display:flex;gap:8px;align-items:center;margin-bottom:16px"><input class="input" id="custom-hold" value="${pose.hold}" placeholder="${state.lang==='ko'?'직접 입력':'Custom'}" style="flex:1"><button class="btn-pri" onclick="setHold('${pid}',document.getElementById('custom-hold').value)">${state.lang==='ko'?'적용':'Apply'}</button></div>
<button class="btn-sec" style="width:100%" onclick="closeModal()">${t('cancel')}</button>`;
}
function setHold(pid,val){
  if(!val)return;
  const seq=getSeqs().find(s=>s.id===state.editId);if(!seq)return;
  const pose=seq.poses.find(p=>p.id===pid);if(!pose)return;
  pose.hold=val;saveSeq(seq);closeModal();
}
function edEditFlowHold(flowId,idx){
  const seq=getSeqs().find(s=>s.id===state.editId);if(!seq)return;
  const flow=seq.poses.find(p=>p.id===flowId);if(!flow||!flow.poses||!flow.poses[idx])return;
  const fp=flow.poses[idx];
  const opts=state.lang==='ko'?['5회 호흡','8회 호흡','10회 호흡','30초','1분','2분']:['5 breaths','8 breaths','10 breaths','30 sec','1 min','2 min'];
  document.getElementById('modal-bg').classList.remove('hidden');
  document.getElementById('modal').innerHTML=`<h3>${state.lang==='ko'?'유지 시간 수정':'Edit hold time'}</h3>
<p style="font-size:13px;color:var(--t2);margin-bottom:16px">${state.lang==='ko'?(fp.pronun||fp.nameKo||fp.name):fp.name}</p>
<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${opts.map(o=>`<button class="pill ${(fp.hold||'5 breaths')===o?'on':''}" onclick="setFlowHold('${flowId}',${idx},'${o}')">${o}</button>`).join('')}</div>
<div style="display:flex;gap:8px;align-items:center;margin-bottom:16px"><input class="input" id="custom-hold" value="${fp.hold||'5 breaths'}" placeholder="${state.lang==='ko'?'직접 입력':'Custom'}" style="flex:1"><button class="btn-pri" onclick="setFlowHold('${flowId}',${idx},document.getElementById('custom-hold').value)">${state.lang==='ko'?'적용':'Apply'}</button></div>
<button class="btn-sec" style="width:100%" onclick="closeModal()">${t('cancel')}</button>`;
}
function setFlowHold(flowId,idx,val){
  if(!val)return;
  const seq=getSeqs().find(s=>s.id===state.editId);if(!seq)return;
  const flow=seq.poses.find(p=>p.id===flowId);if(!flow||!flow.poses||!flow.poses[idx])return;
  flow.poses[idx].hold=val;saveSeq(seq);closeModal();
}
let delSeqConfirm=false;
function edDeleteSeq(){
  if(!state.editId)return;
  if(!delSeqConfirm){delSeqConfirm=true;
    const btn=document.querySelector('.btn-del-seq');
    if(btn){btn.style.color='var(--d-txt)';btn.style.background='var(--d-bg)';btn.title=state.lang==='ko'?'다시 탭하면 삭제됩니다':'Tap again to delete';}
    setTimeout(()=>{delSeqConfirm=false;render();},3000);return;}
  delSeq(state.editId);delSeqConfirm=false;nav('home');
}
function edSave(){
  const seq=getSeqs().find(s=>s.id===state.editId);
  if(!seq){const el=document.querySelector('.ed-name');const ns={id:uid(),title:el?.value||'Enter sequence title',titleKo:el?.value||'시퀀스 제목 입력',style:'vinyasa',duration:60,level:'intermediate',tags:[],source:'manual',poses:[]};saveSeq(ns);state.editId=ns.id;}
  else{const el=document.querySelector('.ed-name');if(el){if(state.lang==='ko')seq.titleKo=el.value;else seq.title=el.value;}
  const selects=document.querySelectorAll('.ed-meta-row .select');
  if(selects[0])seq.style=selects[0].value;if(selects[1])seq.duration=+selects[1].value;if(selects[2])seq.level=selects[2].value;
  saveSeq(seq);}
  nav('home');
}

// AI
function toggleFocus(f){if(state.aiFocus.includes(f))state.aiFocus=state.aiFocus.filter(x=>x!==f);else state.aiFocus.push(f);render();}
async function aiGenerate(){
  const key=getApiKey();if(!key){alert(state.lang==='ko'?'설정에서 Claude API 키를 먼저 입력해주세요.':'Please set your Claude API key in Settings first.');nav('settings');return;}
  state.aiLoading=true;render();
  try{
    const prompt=`You are an experienced yoga teacher. Create a yoga sequence with these parameters:
- Style: ${state.aiStyle}
- Duration: ${state.aiDur} minutes
- Level: ${state.aiLevel}
${state.aiFocus.length?`- Focus areas: ${state.aiFocus.join(', ')}`:''}
${state.aiPeak?`- Peak pose: ${state.aiPeak}`:''}
${state.aiNotes?`- Additional notes: ${state.aiNotes}`:''}
Return ONLY a JSON array of poses. Each pose: {name, nameKo, sanskrit, section (warmup/buildup/peak/cooldown), hold (e.g. "5 breaths"), side (both/left-right)}. Valid JSON only.`;
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:state.aiModel,max_tokens:2000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();const txt=data.content?.[0]?.text||'';
    const clean=txt.replace(/```json\n?|```/g,'').trim();const poses=JSON.parse(clean);
    if(Array.isArray(poses)){const ns={id:uid(),title:`AI ${state.aiStyle} sequence`,titleKo:`AI ${t(state.aiStyle)} 시퀀스`,style:state.aiStyle,duration:state.aiDur,level:state.aiLevel,tags:[],source:'ai',poses:poses.map(p=>({...p,id:uid()}))};saveSeq(ns);lastPage=state.page;state.editId=ns.id;state.page='editor';}
  }catch(e){console.error(e);alert(state.lang==='ko'?'생성에 실패했습니다. API 키를 확인해주세요.':'Generation failed. Check your API key.');}
  state.aiLoading=false;render();
}

// Data
function exportData(){
  const data={sequences:getSeqs(),classes:getClasses(),settings:LS.get(KEYS.SET),version:'1.5.0',exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`yoga-sequences-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
}
function importData(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.sequences)LS.set(KEYS.SEQ,d.sequences);if(d.classes)LS.set(KEYS.CLS,d.classes);if(d.settings)LS.set(KEYS.SET,d.settings);loadSettings();render();}catch{alert('Invalid file');}};r.readAsText(f);};
  input.click();
}
let delConfirm=false;
function deleteData(){if(delConfirm){Object.values(KEYS).forEach(k=>localStorage.removeItem(k));delConfirm=false;initSample();loadSettings();render();}else{delConfirm=true;setTimeout(()=>{delConfirm=false},3000);const el=document.querySelector('.dng');if(el)el.textContent=t('confirmDelete');}}

let _delBlock=false;
function deleteSeq(id,e){
  if(e){e.stopPropagation();e.preventDefault();}
  _delBlock=true;
  setTimeout(()=>{_delBlock=false;},300);
  const seqs=getSeqs().filter(s=>s.id!==id);
  LS.set(KEYS.SEQ,seqs);render();
}

function goBack(){
  if(state.page!=='home'){
    state.page=lastPage||'home';state.editId=null;state.edFilter='all';render();
  }
}

function bindEvents(){
  document.addEventListener('click',function(e){if(!e.target.closest('.sec-add-wrap'))hideSecMenus();});

  // Swipe right to go back
  let navSX=0,navSY=0,navLocked=false;
  document.addEventListener('touchstart',function(e){
    if(e.target.closest('.swipe-wrap'))return;
    navSX=e.touches[0].clientX;navSY=e.touches[0].clientY;navLocked=false;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(navLocked)return;
    const dx=e.changedTouches[0].clientX-navSX;
    const dy=e.changedTouches[0].clientY-navSY;
    if(dx>80&&Math.abs(dy)<60&&navSX<50){goBack();}
  },{passive:true});

  // Swipe to delete
  let swTarget=null,swWrap=null,startX=0,startY=0,curX=0,locked=false;
  function closeAllSwipes(except){
    document.querySelectorAll('.swipe-inner.open').forEach(el=>{
      if(el!==except){el.classList.remove('open');el.closest('.swipe-wrap')?.classList.remove('revealing');}
    });
  }
  document.addEventListener('touchstart',function(e){
    const inner=e.target.closest('.swipe-inner');
    if(!inner){closeAllSwipes(null);return;}
    closeAllSwipes(inner);
    swTarget=inner;swWrap=inner.closest('.swipe-wrap');
    startX=e.touches[0].clientX;startY=e.touches[0].clientY;curX=0;locked=false;
    swTarget.classList.add('swiping');
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!swTarget)return;
    const dx=e.touches[0].clientX-startX;
    const dy=e.touches[0].clientY-startY;
    if(!locked&&Math.abs(dy)>Math.abs(dx)){swTarget.classList.remove('swiping');swTarget=null;return;}
    locked=true;
    const isOpen=swTarget.classList.contains('open');
    const offset=isOpen?dx-80:dx;
    curX=Math.max(-80,Math.min(0,offset));
    swTarget.style.transform=`translateX(${curX}px)`;
    if(curX<-5&&swWrap)swWrap.classList.add('revealing');
    if(Math.abs(dx)>5)e.preventDefault();
  },{passive:false});
  document.addEventListener('touchend',function(){
    if(!swTarget)return;
    swTarget.classList.remove('swiping');
    swTarget.style.transform='';
    if(curX<-40){swTarget.classList.add('open');if(swWrap)swWrap.classList.add('revealing');}
    else{swTarget.classList.remove('open');if(swWrap)swWrap.classList.remove('revealing');}
    swTarget=null;swWrap=null;
  },{passive:true});
}

// Init
initSample();
const APP_VER='1.5.0';
if(localStorage.getItem('yoga_ver')!==APP_VER){
  LS.del(KEYS.SET);localStorage.setItem('yoga_ver',APP_VER);saveSettings();
}
loadSettings();render();bindEvents();

  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('SW registered:', reg.scope);
  }).catch(err => {
    console.log('SW registration failed:', err);
  });
}
